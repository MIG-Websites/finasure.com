<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --navy:   #1a2744;
            --green:  #3a8c4a;
            --green-light: #4fa060;
            --off-white: #f9f9f7;
            --rule:   rgba(26, 39, 68, 0.12);
            --text-muted: rgba(26, 39, 68, 0.45);
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--off-white);
            color: var(--navy);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Subtle background texture */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 50% -10%, rgba(58, 140, 74, 0.05) 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 50% 110%, rgba(26, 39, 68, 0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Thin accent line at top */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--navy) 0%, var(--green) 100%);
            z-index: 10;
        }

        /* ============ MAIN LAYOUT ============ */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 24px 60px;
            position: relative;
            z-index: 1;
        }

        .stage {
            text-align: center;
            max-width: 600px;
            width: 100%;
            animation: fadeUp 1.4s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        /* ============ LOGO ============ */
        .logo-wrap {
            margin-bottom: 64px;
        }

        .logo-wrap img {
            width: 100%;
            max-width: 320px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* ============ DIVIDER ============ */
        .divider {
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, var(--navy), var(--green));
            margin: 0 auto 48px;
            opacity: 0.4;
        }

        /* ============ HEADLINE ============ */
        h1 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-weight: 300;
            font-size: clamp(42px, 7vw, 72px);
            letter-spacing: -0.01em;
            line-height: 1;
            color: var(--navy);
            margin-bottom: 28px;
        }

        h1 em {
            font-style: italic;
            color: var(--green);
        }

        /* ============ TAGLINE ============ */
        .tagline {
            font-family: 'Inter', system-ui, sans-serif;
            font-weight: 300;
            font-size: clamp(13px, 1.8vw, 15px);
            letter-spacing: 0.08em;
            line-height: 1.8;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* ============ FOOTER ============ */
        footer {
            position: relative;
            z-index: 1;
            padding: 24px;
            text-align: center;
        }

        .footer-name {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-weight: 400;
            font-size: 13px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        /* ============ ANIMATION ============ */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 480px) {
            main {
                padding: 72px 32px 48px;
            }

            .logo-wrap {
                margin-bottom: 48px;
            }

            .logo-wrap img {
                max-width: 260px;
            }

            .divider {
                margin-bottom: 36px;
            }
        }

        @media (min-width: 1200px) {
            .logo-wrap img {
                max-width: 360px;
            }
        }
    </style>
</head>
